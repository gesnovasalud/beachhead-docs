name: Build Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SITE_NAME: ${{ vars.SITE_NAME }}
      # SITE_URL: ${{ vars.SITE_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json
      
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader
      
      - name: Build Hyde site
        run: php hyde build
      
      - name: Checkout beachhead repository
        uses: actions/checkout@v4
        with:
          repository: gesnovasalud/beachhead
          ref: main
          path: beachhead
          token: ${{ secrets.PAT_PR_DOCS_BH }}
      
      - name: Copy docs to beachhead repo
        run: |         
          # Eliminar directorios existentes para reemplazar completamente
          rm -rf beachhead/public/media
          rm -rf beachhead/public/docs
          
          # Copiar los directorios generados directamente a public/
          cp -r _site/media beachhead/public/
          cp -r _site/docs beachhead/public/
      
      - name: Create Pull Request to beachhead
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_PR_DOCS_BH }}
          path: beachhead
          commit-message: 'docs: update documentation from beachhead-docs'
          branch: docs-update-${{ github.run_number }}
          delete-branch: true
          title: 'docs: Update documentation build'
          body: |
            ## 📚 Documentation Update
            
            This PR updates the documentation build from [beachhead-docs](https://github.com/gesnovasalud/beachhead-docs).
            
            ### Changes
            - Updated `/public/media`
            - Updated `/public/docs`
            
            **Source commit:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}
            **Build number:** ${{ github.run_number }}
            
            ---
            _Auto-generated by GitHub Actions_
          labels: |
            documentation
            automated
