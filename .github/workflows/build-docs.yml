name: Build Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build documentation
        run: npm run build
      
      - name: Checkout beachhead repository
        uses: actions/checkout@v4
        with:
          repository: gesnovasalud/beachhead
          ref: main
          path: beachhead
          token: ${{ secrets.PAT_PR_DOCS_BH }}
      
      - name: Copy docs to beachhead
        run: |
          rm -rf beachhead/public/docs
          cp -r site beachhead/public/docs
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_PR_DOCS_BH }}
          path: beachhead
          commit-message: 'docs: update documentation'
          branch: docs-update-${{ github.run_number }}
          delete-branch: true
          title: 'docs: Update documentation'
          body: |
            Documentation updated from [beachhead-docs](https://github.com/gesnovasalud/beachhead-docs)
            
            **Source:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}
            **Build:** ${{ github.run_number }}
          labels: documentation,automated
